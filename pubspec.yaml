name: controle_gastos
description: Controle de gastos com comprovantes offline.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  image_picker: ^1.0.7
  intl: ^0.19.0
  fl_chart: ^0.68.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  sqflite_common_ffi: ^2.3.3
  sqflite_common_ffi_web: ^1.0.2
  emoji_picker_flutter: ^4.4.0
  flutter_colorpicker: ^1.1.0
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/imagens/logo.png"
  adaptive_icon_background: "#FFFFFF"
